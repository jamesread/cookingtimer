name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Make dist-prod
      run: make -w dist-prod

    - name: Image tag
      id: tag
      run: echo "tag=$(date +'%s')" >> "$GITHUB_OUTPUT"

    - name: Build the Container image
      run: docker build . --file Dockerfile --tag "ghcr.io/jamesread/cookingtimer:${{ steps.tag.outputs.tag }}"

    - name: Login to ghcr.io
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3.5.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Tag latest
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: docker tag "ghcr.io/jamesread/cookingtimer:${{ steps.tag.outputs.tag }}" ghcr.io/jamesread/cookingtimer:latest

    - name: Push the Container image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: docker push "ghcr.io/jamesread/cookingtimer:${{ steps.tag.outputs.tag }}"

    - name: Push the Container image - latest tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: docker push ghcr.io/jamesread/cookingtimer:latest
